name: Release Drafter

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Update Release
    runs-on: ubuntu-24.04
    steps:
      - name: Publish Release
        uses: release-drafter/release-drafter@ed4bc48ec97379be2258e7b7ac2624a3e26ab809 # v7.4.0
        with:
          publish: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
