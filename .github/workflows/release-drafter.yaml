name: Release Drafter

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Update Release
    runs-on: ubuntu-24.04
    steps:
      - name: Publish Release
        uses: release-drafter/release-drafter@693d20e7c1ce1a81d3a41962f85914253b518449 # v7.3.1
        with:
          publish: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
