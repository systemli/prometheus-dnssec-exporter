name: Release Drafter

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Update Release
    runs-on: ubuntu-24.04
    steps:
      - name: Publish Release
        uses: release-drafter/release-drafter@eada3c96a64734dd381cfbda23511034e328ddb0 # v7.6.0
        with:
          publish: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
